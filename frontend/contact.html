<style>
   /* Contact Section */
.contact-section {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #292929;
  overflow: hidden;
}

/* Contact Wrapper */
.contact-wrapper {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

/* Heading & Subtitle */
.contact-wrapper h1 {
  font-size: 4rem;
  margin-bottom: 10px;
  color: #ffffff;
}

.contact-wrapper p {
  font-size: 1.2rem;
  color: #c7c7c7;
  margin-bottom: 30px;
}

/* Contact Form */
.contact-form {
  width: 400px;
  max-width: 90%;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.contact-form input,
.contact-form textarea {
  padding: 14px 16px;
  font-size: 1rem;
  border: 1px solid #c7c7c7;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(6px);
  color: #ffffff;
  outline: none;
  transition: all 0.3s ease;
}

.contact-form input::placeholder,
.contact-form textarea::placeholder {
  color: #c7c7c7;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #616161;
  box-shadow: 0 0 10px rgba(97, 97, 97, 0.2);
}

/* Textarea */
.contact-form textarea {
  min-height: 120px;
  resize: none;
}

/* Submit Button */
.contact-form button {
  padding: 14px;
  font-size: 1rem;
  font-weight: 600;
  background: #c7c7c7;
  color: #292929;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s ease, color 0.3s ease;
}

.contact-form button:hover {
  background: #292929;
  color: #ffffff;
}

    /* Background Boxes (solid) */
    .boxes {
        position: relative;
        z-index: 1;
    }

    .box {
        height: 1.2vh;
        width: 50vw;
        background: #616161;
        /* Fully solid color */
        margin-bottom: -0.2vh;
        display: block;
    }
    /* Map Container */
  .map-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    height: 450px;
    background: url('images/map.avif') no-repeat center/cover;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin: 0 auto 60px auto;
  }

  h1.map-title {
    text-align: center;
    margin-bottom: 40px;
    font-size: 2rem;
    font-weight: 600;
    color: #292929;
  }

  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #c7c7c7;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .dot:hover {
    transform: scale(1.4);
    box-shadow: 0 0 15px #c7c7c7;
  }

  .dot::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #292929;
    border-radius: 50%;
  }

  .audio-label {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    color: #292929;
  }

  .dot:hover .audio-label {
    opacity: 1;
  }
  .mt h1{
    font-family: 'Inter', sans-serif;
    color: #c7c7c7;
    text-align: center;

  .soundwave-footer {
  width: 100%;
  height: 80px;
  margin-top: 60px;
  background: #292929;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bar {
  width: 4px;
  height: 20px;
  background: #c7c7c7;
  margin: 0 2px;
  animation: wave 1s infinite ease-in-out;
}

.bar:nth-child(2) { animation-delay: 0.1s; }
.bar:nth-child(3) { animation-delay: 0.2s; }
.bar:nth-child(4) { animation-delay: 0.3s; }
.bar:nth-child(5) { animation-delay: 0.4s; }
.bar:nth-child(6) { animation-delay: 0.5s; }
.bar:nth-child(7) { animation-delay: 0.6s; }
.bar:nth-child(8) { animation-delay: 0.7s; }

@keyframes wave {
  0%, 100% { height: 20px; }
  50% { height: 60px; }
}
/* ---------------- TEAM QUOTE CAROUSEL ---------------- */
.quote-carousel {

.quote-slide span {

.carousel-controls {

.carousel-controls button {

  cursor: pointer;
  font-size: 1rem;
  transition: transform 0.2s ease;
}

.carousel-controls button:hover {
  transform: scale(1.1);
}

<script>
  const dots = document.querySelectorAll('.dot');

  dots.forEach(dot => {
    const audio = dot.querySelector('audio');

    dot.addEventListener('mouseenter', () => {
      audio.currentTime = 0;
      audio.play();
    });

    dot.addEventListener('mouseleave', () => {
      audio.pause();
    });

    dot.addEventListener('click', () => {
      if(audio.paused){
        audio.play();
      } else {
        audio.pause();
      }
    });
  });
</script>

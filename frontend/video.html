  #hero-3d {

}

.stage {
  position: relative;
  height: 100vh;
  perspective: 1200px;
  transform-style: preserve-3d;
  overflow: hidden;
}

.box {
  position: absolute;
  width: 260px;
  height: 150px;
  left: 50%;
  top: 50%;
  margin: -75px -130px;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 15px 40px rgba(0,0,0,0.45);
}

.box iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.videoh{
  text-align: center;

  font-size: 10%;
  margin-top: 50px;

.old-tv {
  width: 620px;

  background: #292929;
  border: 8px solid #616161;
  border-radius: 25px;
  position: relative;
  margin: 40px auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}

.screen {
  width: 90%;
  height: 300px;
  margin: 20px auto 0;
  background: #c7c7c7;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
}

.tv-btn {
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background-color: #616161;
  color: #ffffff;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 0 10px #000;
  transition: 0.3s;
}

.tv-btn:hover {
  background-color: #c7c7c7;
  color: #292929;
}

.tv-leg {
  width: 20px;
  height: 40px;
  background: #616161;
  position: absolute;
  bottom: -40px;
  border-radius: 5px;
}

.tv-leg.left {
  left: 20px;
}

.tv-leg.right {
  right: 20px;
}
.falling-icon {
    position: absolute;
    font-size: 10rem; /* default bigger size */
    color: #c7c7c7;
    pointer-events: none;
    opacity: 0.9;
    animation: fall 3s forwards;
  }
.box video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

  @keyframes fall {
    0% {
      transform: translateY(-50px) rotate(0deg);
    }
    80% {
      transform: translateY(calc(100vh - 80px)) rotate(720deg);
    }
    100% {
      transform: translateY(calc(100vh - 80px)) rotate(720deg);
    }
  }

  /* Shake effect on the page */
  @keyframes shake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
    100% { transform: translateX(0); }
  }

  .shake {
    animation: shake 0.6s;
  }

  /* Bottom container for stacked icons */
  #icon-stack {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding-bottom: 10px;
  }
  

</style>
<body>
  <div id="icon-stack"></div>

<script>
  const icons = [ 'fa-circle-play' ]; // FontAwesome icons
  const iconStack = document.getElementById('icon-stack');
  const body = document.body;

  function createFallingIcon() {
    const icon = document.createElement('i');
    const randomIcon = icons[Math.floor(Math.random() * icons.length)];
    icon.className = `fa-solid ${randomIcon} falling-icon`;
    
    // Wider horizontal spread
    icon.style.left = Math.random() * (window.innerWidth - 80) + 'px'; 
    // Bigger random size
    icon.style.fontSize = 70 + Math.random() * 70 + 'px'; // 36-72px
    
    document.body.appendChild(icon);

    // Shake effect when it lands
    setTimeout(() => {
      body.classList.add('shake');
      setTimeout(() => body.classList.remove('shake'), 600);
    }, 2500);

    // Move icon to bottom stack after falling
    setTimeout(() => {
      iconStack.appendChild(icon);
      icon.style.position = 'relative';
      icon.style.left = 'auto';
      icon.style.top = 'auto';
      icon.style.transform = 'none';
    }, 3000);
  }

  // Create multiple falling icons
  for (let i = 0; i < 10; i++) {
    setTimeout(createFallingIcon, i * 150); // staggered
  }
</script>

<script>
gsap.registerPlugin(ScrollTrigger);

const boxes = gsap.utils.toArray(".box");
const radius = 420;
const total = boxes.length;

// INITIAL CIRCLE
boxes.forEach((box, i) => {
  const angle = (i / total) * Math.PI * 2;
  gsap.set(box, {
    x: Math.cos(angle) * radius,
    z: Math.sin(angle) * radius,
    rotationY: (i / total) * 360
  });
});

// SCROLL TIMELINE
const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".demoWrapper",
    start: "top top",
    end: "bottom top",
    scrub: 1.1,
    pin: ".stage",
    anticipatePin: 1
  }
});

// CIRCLE → LINE
tl.to(boxes, {
  x: i => (i - total / 2) * 300,
  z: 0,
  rotationY: 0,
  ease: "power2.inOut",
  duration: 2
});

// SLIDE LINE
tl.to(boxes, {
  x: "+=400",
  duration: 1.5,
  ease: "none"
});

// LINE → CIRCLE
tl.to(boxes, {
  x: i => Math.cos((i / total) * Math.PI * 2) * radius,
  z: i => Math.sin((i / total) * Math.PI * 2) * radius,
  rotationY: i => (i / total) * 360,
  ease: "power2.inOut",
  duration: 2
});
</script>

});
